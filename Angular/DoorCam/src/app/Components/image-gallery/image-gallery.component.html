<div class="container">
  <!-- User Info Card -->
  <div class="user-card">
    <div class="user-info">
      <label>Brugernavn</label>
      <input type="text" value="{{ username }}" readonly />
      <button class="edit-btn">Rediger</button>
    </div>

    <div class="user-info">
      <label style="margin-right: 8.6%;">Password</label>
      <input type="password" value="******" readonly />
    </div>

    <div class="user-info registration-code">
      <span style="font-size: smaller;">Registreringskode :</span>
      <span style="font-size: smaller;">{{ registration_Code }}</span>
      <button class="manage-btn">Administre enheder</button>
    </div>
  </div>

  <!-- Image Grid -->
  <div class="image-grid">
    <div *ngFor="let img of ImageArray" class="image-item">
      <!-- Show image if img is not null and is a base64 string -->
      <img *ngIf="img" [src]="'data:image/jpeg;base64,' + img" alt="IMG" />
      
      <!-- Show gray box with 'IMG' text if img is null -->
      <span *ngIf="!img">IMG</span>
    </div>
  </div>
</div>
